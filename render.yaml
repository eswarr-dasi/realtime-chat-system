# Render Blueprint — one-click deployment
# https://render.com/docs/blueprint-spec
#
# This provisions:
#   1. A web service (this Spring Boot app, built from the Dockerfile)
#   2. A free Redis instance (for pub/sub message relay across instances)
#   3. A free PostgreSQL database (for message/room persistence)
#
# TO DEPLOY:
#   1. Push this repo to your own GitHub account (already done)
#   2. Go to https://dashboard.render.com/blueprints
#   3. Click "New Blueprint Instance" and connect this repo
#   4. Render will read this file and provision everything automatically

services:
  - type: web
    name: realtime-chat-system
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chat-db
          property: connectionString
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: REDIS_HOST
        fromService:
          type: redis
          name: chat-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: chat-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: INSTANCE_ID
        value: render-instance-1

  - type: redis
    name: chat-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all (demo only — restrict in production)

databases:
  - name: chat-db
    plan: free
    databaseName: chatdb
    user: chatuser
