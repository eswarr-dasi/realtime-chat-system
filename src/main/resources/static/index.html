<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real-Time Chat Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #f5f6f8; margin: 0; }
  .app { max-width: 720px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 22px; color: #1a1a2e; }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.06); padding: 20px; margin-bottom: 16px; }
  input, button { font-size: 14px; padding: 10px 12px; border-radius: 6px; border: 1px solid #dcdfe4; }
  button { background: #4f46e5; color: #fff; border: none; cursor: pointer; font-weight: 600; }
  button:hover { background: #4338ca; }
  #messages { height: 360px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 12px; background: #fafafa; }
  .msg { margin-bottom: 8px; }
  .msg .sender { font-weight: 600; color: #4f46e5; }
  .msg.system { color: #888; font-style: italic; font-size: 13px; }
  .row { display: flex; gap: 8px; margin-top: 12px; }
  .row input { flex: 1; }
  #presence { font-size: 13px; color: #666; margin-top: 8px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 6px; }
</style>
</head>
<body>
<div class="app">
  <h1>💬 Real-Time Chat System</h1>
  <p style="color:#666; font-size:14px;">WebSocket + STOMP + Redis pub/sub demo — built by Eswarr Dasi</p>

  <div class="card" id="loginCard">
    <input id="userNameInput" placeholder="Enter your name" style="width:60%">
    <input id="roomInput" placeholder="Room name (e.g. general)" value="general" style="width:30%">
    <button id="joinBtn">Join Chat</button>
  </div>

  <div class="card" id="chatCard" style="display:none;">
    <div id="messages"></div>
    <div class="row">
      <input id="messageInput" placeholder="Type a message..." disabled>
      <button id="sendBtn" disabled>Send</button>
    </div>
    <div id="presence"><span class="status-dot"></span>Connected as <b id="currentUser"></b> in room <b id="currentRoom"></b></div>
  </div>
</div>

<script>
let stompClient = null;
let currentRoomId = null;
let currentUserName = null;

document.getElementById('joinBtn').onclick = async () => {
  const userName = document.getElementById('userNameInput').value.trim() || 'Guest';
  const roomId = document.getElementById('roomInput').value.trim() || 'general';
  currentUserName = userName;
  currentRoomId = roomId;

  // 1. Get JWT
  const authResp = await fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ userName })
  });
  const { token } = await authResp.json();

  // 2. Connect WebSocket with token
  const socket = new SockJS('/ws?token=' + encodeURIComponent(token));
  stompClient = new StompJs.Client({ webSocketFactory: () => socket });

  stompClient.onConnect = () => {
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('chatCard').style.display = 'block';
    document.getElementById('currentUser').textContent = userName;
    document.getElementById('currentRoom').textContent = roomId;
    document.getElementById('messageInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;

    stompClient.subscribe('/topic/room.' + roomId, (msg) => {
      const body = JSON.parse(msg.body);
      appendMessage(body);
    });

    stompClient.publish({ destination: '/app/chat.join.' + roomId });

    // Load recent history
    fetch('/api/rooms/' + roomId + '/messages')
      .then(r => r.json())
      .then(history => history.reverse().forEach(appendMessage))
      .catch(() => {});
  };

  stompClient.activate();
};

document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('messageInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMessage();
});

function sendMessage() {
  const input = document.getElementById('messageInput');
  const content = input.value.trim();
  if (!content || !stompClient) return;
  stompClient.publish({
    destination: '/app/chat.send.' + currentRoomId,
    body: JSON.stringify({ content })
  });
  input.value = '';
}

function appendMessage(msg) {
  const div = document.createElement('div');
  if (msg.type === 'JOIN' || msg.type === 'LEAVE') {
    div.className = 'msg system';
    div.textContent = msg.content;
  } else {
    div.className = 'msg';
    div.innerHTML = '<span class="sender">' + escapeHtml(msg.senderName) + ':</span> ' + escapeHtml(msg.content);
  }
  const container = document.getElementById('messages');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
